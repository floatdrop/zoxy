name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use the pinned toolchain from the flake so CI matches local dev exactly
      # (zig_0_16 + zls), served from the Nix binary cache.
      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check formatting
        run: nix develop --command zig fmt --check src build.zig

      # zig fmt does not enforce line width; TigerStyle mandates a hard 100-column
      # limit (docs/TIGER_STYLE.md). Fail loudly on any offending line.
      - name: Check line length (100-column hard limit)
        run: |
          offenders=$(awk 'length > 100 { print FILENAME ":" FNR " (" length " cols)" }' \
            $(find src -name '*.zig') build.zig)
          if [ -n "$offenders" ]; then
            echo "$offenders"
            echo "::error::lines above exceed the 100-column TigerStyle limit"
            exit 1
          fi

      - name: Build
        run: nix develop --command zig build

      - name: Run tests
        run: nix develop --command zig build test --summary all

      # Deterministic simulation: the real data path on the simulation IO
      # backend under seeded adversarial schedules. Fixed seed range so any
      # failure reproduces locally with `zig build sim -- <seed> 1`.
      - name: Run simulator (seeds 0..300)
        run: nix develop --command zig build sim -- 0 300
